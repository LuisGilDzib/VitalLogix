spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vitallogix}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vitallogix}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vitallogix123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT secret should come from env in real deployments.
# Default value must be >= 32 bytes for HS256 compatibility.
jwt.secret=${JWT_SECRET:CHANGE_ME_SET_A_STRONG_JWT_SECRET_32B_MIN}

# CORS allowed origins (comma-separated). Keep localhost by default and override per environment.
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Combo suggestion engine configuration
app.suggestion.max-recommendations=6
app.suggestion.exploration-weight=0.65
