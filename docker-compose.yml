version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: vitallogix-db
    restart: always
    environment:
      POSTGRES_DB: vitallogix
      POSTGRES_USER: vitallogix
      POSTGRES_PASSWORD: vitallogix123
    ports:
      - "5432:5432"
    volumes:
      - vitallogix_data:/var/lib/postgresql/data

volumes:
  vitallogix_data:
